kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"
deploymentTarget = "vm"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/dashboard", "/dashboard/", "/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = "bash scripts/build-production.sh"
run = "pnpm --filter @workspace/api-server run start"

[services.env]
PORT = "8080"
NODE_ENV = "production"
